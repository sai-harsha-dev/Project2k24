name: AZURE FRONTEND PIPELINE

on:
   push:
        branches:
            - 'azfunction'
        paths:
            - 'scripts/Web/**'  

jobs:
    Trigger_azure_function:
        name: Trigger azure function
        runs-on: ubuntu-24.04
        steps:
            - name: Install Azure CLI
              run: |
                sudo apt-get update
                sudo apt-get install apt-transport-https ca-certificates curl gnupg lsb-release
            
            - name: Login using service principal
              env:
                APP_ID: ${{ secrets.azuresp_app_id}}
                CLIENT_SECRET: ${{ secrets.azuresp_secret}}
                TENANT_ID: ${{ secrets.azuresp_tenant_id}}
              run: |
                az login --service-principal \
                --username $APP_ID \
                --password $CLIENT_SECRET \
                --tenant $TENANT_ID

            - name: Create Azure Resources
              run: |
                az storage account create -n rb_stg -l centralindia -g Roboshop --sku Standard_LRS
                az functionapp create -g Roboshop --consumption-plan-location centralindia --runtime python--runtime-version 3.11 --fucntion-version 4 -name Roboshop_app --os-type linux ---storage-account rb_stg

            - name: Checkout functions code repo
              uses: actions/checkout@v3

            - name: Install python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'

            - name: Install Dependencies
              run: |
                pushd './Project2k24/Infra/Azure/Function/web_update'
                python -m pip install --upgrade pip
                pip install -r requirements.txt --target=".python_packages/lib/site-packages"
                popd

            - name: Deploy funtion to functionapp
              uses: Azure/functions-action@v1
              with: 
                app-name: Roboshop_app
                package: './Project2k24/Infra/Azure/Function/web_update'

            - name: Trigger Web update function
              run: |
                URL=(az functionapp function show --function-name web_update --name Roboshop_app -g Roboshop --query 'invokeUrlTemplate' --output tsv) &&

                curl -d "sub_id=&resource_group_name=Roboshop&vmss_name=webscaleset" $URL

            - name: Delete functionapp
              run: |
                az functionapp delete -g Roboshop --name Roboshop_app
                