name: AZURE FRONTEND PIPELINE

on:
   push:
        branches:
            - 'azfunction'
        paths:
            - 'scripts/Web/**'  

jobs:
    Trigger_azure_function:
        name: Trigger azure function
        runs-on: ubuntu-24.04
        steps:
            - name: Install Azure CLI
              run: |
                sudo apt-get update
                sudo apt-get install apt-transport-https ca-certificates curl gnupg lsb-release
            
            - name: Login using service principal
              env:
                APP_ID: ${{ secrets.azuresp_app_id}}
                CLIENT_SECRET: ${{ secrets.azuresp_secret}}
                TENANT_ID: ${{ secrets.azuresp_tenant_id}}
              run: |
                az login --service-principal --username $APP_ID --password $CLIENT_SECRET --tenant $TENANT_ID

            - name: Create Azure Resources
              run: |
                az storage account create -n rbstg -l centralindia -g Roboshop --sku Standard_LRS
                az functionapp create -g Roboshop --consumption-plan-location centralindia --runtime python --runtime-version 3.11 --functions-version 4 --name Roboshopapp --os-type linux --storage-account rbstg

            - name: Checkout functions code repo
              uses: actions/checkout@v3
              with:
                ref: azfunction

            - name: Install python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'

            - name: Install Dependencies
              run: |
                pushd './Infra/Azure/Functions/web_app'
                python -m pip install --upgrade pip
                pip install -r requirements.txt --target=".python_packages/lib/site-packages"
                popd

            - name: Deploy funtion to functionapp
              uses: Azure/functions-action@v1
              with: 
                app-name: Roboshopapp
                package: './Infra/Azure/Functions/web_app/'

            - name: Trigger Web update function
              env:
                SUB_ID: ${{ secrets.sub_id}}
              run: |
                URL=$(az functionapp function show --function-name web_update --name Roboshopapp -g Roboshop --query 'invokeUrlTemplate' --output tsv) &&
                curl -d "sub_id=$SUB_ID&resource_group_name=Roboshop&vmss_name=webscaleset" $URL

            - name: Delete functionapp
              run: |
                az functionapp delete -g Roboshop --name Roboshopapp
                